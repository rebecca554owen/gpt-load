name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (必须以v开头，例如: v1.0.0, v2.1.3, v1.0.0-beta, v3.2.1-rc1)'
        required: true
        default: 'v1.7.0'
      use_latest:
        description: '是否同时打上 latest 标签'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_docker_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Validate version input
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v.* ]]; then
            echo "错误：版本号格式不正确，必须以 v 开头 (例如: v1.0.0, v2.1.3, v1.0.0-beta, v3.2.1-rc1)"
            exit 1
          fi
          echo "版本号验证通过：${{ github.event.inputs.version }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.use_latest == 'true' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.event.inputs.version }}
          provenance: false

      - name: Get build time (UTC+8)
        id: time
        run: |
          echo "build_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S (UTC+8)')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: |
            ## What's Changed

            **镜像**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}`

            **启动容器**:
            ```bash
            docker run -d --name gpt-load --restart unless-stopped -p 3001:3001 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
            ```

            *构建时间: ${{ steps.time.outputs.build_time }}*
            *提交: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') || contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'dev') || contains(github.event.inputs.version, 'test') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
