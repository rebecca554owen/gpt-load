name: Build Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (必须以v开头，例如: v1.0.0, v2.1.3, v1.0.0-beta, v3.2.1-rc1)'
        required: true
        default: 'v1.9.0'
      is_prerelease:
        description: '标记为预发布版本 (勾选则不加 latest tag)'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_docker_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
      IS_PRERELEASE: ${{ github.event_name == 'push' && (contains(github.ref_name, '-') && 'true' || 'false') || github.event.inputs.is_prerelease }}
    steps:
      - name: Validate version
        run: |
          if [[ ! "$VERSION" =~ ^v.* ]]; then
            echo "错误：版本号格式不正确，必须以 v 开头"
            exit 1
          fi
          echo "版本号: $VERSION  预发布: $IS_PRERELEASE"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest,enable=${{ env.IS_PRERELEASE == 'false' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}
          provenance: false

      - name: Get build time (UTC+8)
        id: time
        run: |
          echo "build_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S (UTC+8)')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: |
            ## What's Changed

            **镜像**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}`

            **启动容器**:
            ```bash
            docker run -d --name gpt-load --restart unless-stopped -p 3001:3001 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ```

            *构建时间: ${{ steps.time.outputs.build_time }}*
            *提交: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})*
          generate_release_notes: true
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
